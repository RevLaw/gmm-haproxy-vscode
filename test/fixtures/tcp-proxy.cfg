# TCP proxy example — database load balancing
global
    daemon
    log /dev/log local0
    maxconn 10000

defaults
    mode tcp
    log global
    option tcplog
    option dontlognull
    retries 3
    timeout connect 5s
    timeout client 30s
    timeout server 30s

frontend postgres-in
    bind *:5432
    default_backend postgres-cluster

backend postgres-cluster
    balance roundrobin
    option tcp-check
    server pg-primary 10.0.0.10:5432 check inter 2s rise 2 fall 3
    server pg-replica 10.0.0.11:5432 check inter 2s rise 2 fall 3 backup
