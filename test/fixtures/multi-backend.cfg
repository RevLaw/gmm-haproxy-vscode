# Multi-backend HTTP routing with ACLs
global
    daemon
    log 127.0.0.1:514 local0
    maxconn 50000
    nbthread 8

defaults
    mode http
    log global
    option httplog
    option dontlognull
    option forwardfor
    option http-server-close
    timeout connect 10s
    timeout client 60s
    timeout server 60s
    timeout http-request 15s
    retries 3

frontend public
    bind *:80
    bind *:443 ssl crt /etc/ssl/haproxy.pem

    # Route by host
    acl is_api hdr(host) -i api.example.com
    acl is_admin hdr(host) -i admin.example.com
    acl is_static path_beg /static /assets /images

    # Route by path
    acl is_health path_eq /health

    # Security ACLs
    acl is_bad_bot hdr_sub(user-agent) -i curl wget python

    http-request deny if is_bad_bot
    http-request return status 200 if is_health

    use_backend api-backend if is_api
    use_backend admin-backend if is_admin
    use_backend static-backend if is_static
    default_backend web-backend

backend web-backend
    balance roundrobin
    option httpchk GET /health
    http-check expect status 200
    http-request set-header X-Backend web
    server web1 10.1.0.1:8080 check inter 2s weight 10
    server web2 10.1.0.2:8080 check inter 2s weight 10
    server web3 10.1.0.3:8080 check inter 2s weight 5

backend api-backend
    balance leastconn
    option httpchk GET /api/health
    http-request set-header X-Backend api
    server api1 10.2.0.1:9000 check inter 2s
    server api2 10.2.0.2:9000 check inter 2s

backend admin-backend
    balance source
    option httpchk GET /admin/health
    server admin1 10.3.0.1:8081 check inter 5s

backend static-backend
    balance roundrobin
    server cdn1 10.4.0.1:80 check
    server cdn2 10.4.0.2:80 check
